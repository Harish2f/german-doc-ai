name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: germandocai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localdevpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          APP_NAME: GermanDocAI
          APP_VERSION: 0.1.0
          ENVIRONMENT: development
          DEBUG: "false"
          API_KEY: dev-secret-key
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: germandocai
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: localdevpassword
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: 9200
          OPENSEARCH_INDEX: german-docs-chunks
          OPENSEARCH_USE_AWS: "false"
          OPENSEARCH_AWS_REGION: eu-north-1
          AZURE_OPENAI_API_KEY: ""
          AZURE_OPENAI_ENDPOINT: ""
          AZURE_OPENAI_DEPLOYMENT: gpt-4o
          JINA_API_KEY: ""
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_SECRET_KEY: ""
          LANGFUSE_HOST: https://cloud.langfuse.com
        run: uv run pytest tests/ -v

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: germandocairegistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: germandocairegistry.azurecr.io/germandocai:latest

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: germandocairegistry
          containerAppName: germandocai
          resourceGroup: german-doc-ai
          imageToDeploy: germandocairegistry.azurecr.io/germandocai:latest
          acrUsername: ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}